<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #1abc9c, #3498db);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: #111;
            padding: 40px;
            width: 320px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            color: white;
        }

        .login-container h2 {
            margin-bottom: 25px;
        }

        .input-group {
            margin: 15px 0;
            text-align: left;
        }

        .input-group label {
            font-size: 14px;
            color: #ccc;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: none;
            border-radius: 10px;
            background: #222;
            color: white;
        }

        .input-group input:focus {
            outline: 2px solid #1abc9c;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #1abc9c;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
        }

        .login-btn:hover {
            background: #16a085;
        }

        .extra {
            margin-top: 15px;
            font-size: 14px;
        }

        .extra a {
            color: #1abc9c;
            text-decoration: none;
        }

        .extra a:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

    <div class="login-container">
        <h2>Login</h2>

        <form>

            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="Enter your email">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Enter your password">
            </div>

            <button class="login-btn">Login</button>

        </form>

        <div class="extra">
            <p>Don't have an account? <a href="#">Sign up</a></p>
            <p><a href="#">Forgot password?</a></p>
        </div>
    </div>

</body>
</html>
